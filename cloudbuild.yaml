steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/project-317606fd-894f-479f-aeb/test-registry/my-app:$SHORT_SHA', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/project-317606fd-894f-479f-aeb/test-registry/my-app:$SHORT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      [
        'run', 'deploy', 'my-service',
        '--image', 'us-central1-docker.pkg.dev/project-317606fd-894f-479f-aeb/test-registry/my-app:$SHORT_SHA',
        '--region', 'us-central1',
        '--platform', 'managed',
        '--allow-unauthenticated'
      ]

images:
  - 'gcr.io/project-317606fd-894f-479f-aeb/my-app:$SHORT_SHA'
options:
  logging: CLOUD_LOGGING_ONLY
